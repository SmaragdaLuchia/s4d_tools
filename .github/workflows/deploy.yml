name: Deploy 

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy using Podman
        run: |
          # 1. Navigate to your project folder
          cd /home/smaragdasarana/Visualizer

          # 2. Pull latest code
          git pull origin main

          # 3. Use Podman Compose instead of Docker
          # (Ensure you have podman-compose installed)
          podman-compose down
          podman-compose up -d --build
          
          # Optional: Clean up unused podman images
          podman system prune -f
